<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GATE.AI — Data Science & AI Preparation Platform</title>
    <meta name="description" content="The most advanced AI-powered GATE DA preparation platform. Practice MCQs, solve PYQs, get instant AI explanations, and track your progress with intelligent analytics." />

    <!-- Fonts: Fraunces (display serif) + Plus Jakarta Sans (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

    <style>
      :root {
        color-scheme: light;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #CBD5E1 #F1F5F9;
      }
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: #F1F5F9;
      }
      *::-webkit-scrollbar-thumb {
        background: #CBD5E1;
        border-radius: 3px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: #2563EB;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #FFFFFF;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        color: #0F172A;
      }
      .katex-display {
        overflow-x: auto;
        overflow-y: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
